<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso | Denise Venica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--white); margin: 0; padding-top: 70px; }

    /* Nav */
    .curso-nav {
      background: #fff; padding: 14px 24px; border-bottom: 1px solid var(--linen);
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      box-sizing: border-box;
    }
    .curso-nav .brand h4 { font-size: 1.15rem; color: var(--earth); margin: 0; }
    .curso-nav .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--plum); font-weight: 600; font-size: 0.9rem;
    }
    .curso-nav .back-btn:hover { text-decoration: underline; }

    /* Layout */
    .curso-layout {
      display: grid; grid-template-columns: 1fr 320px;
      max-width: 1200px; margin: 0 auto; gap: 0;
      min-height: calc(100vh - 70px);
    }

    /* Video area */
    .video-area { padding: 32px; }
    .video-wrapper {
      width: 100%; aspect-ratio: 16/9; background: #111;
      border-radius: var(--radius-sm); overflow: hidden;
      margin-bottom: 24px; position: relative;
    }
    .video-wrapper iframe {
      width: 100%; height: 100%; border: none;
    }

    .video-info h1 {
      font-size: 1.6rem; color: var(--earth); margin-bottom: 8px;
    }
    .video-info p {
      color: var(--clay); font-size: 1rem; line-height: 1.7;
    }

    /* Sidebar */
    .curso-sidebar {
      background: var(--linen); border-left: 1px solid var(--sand);
      padding: 24px 0; overflow-y: auto;
    }
    .sidebar-header {
      padding: 0 20px 16px; border-bottom: 1px solid var(--sand);
      margin-bottom: 8px;
    }
    .sidebar-header h3 {
      font-size: 1rem; color: var(--earth); margin: 0 0 4px;
    }
    .sidebar-header p {
      font-size: 0.8rem; color: var(--clay); margin: 0;
    }

    .module-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer; transition: var(--transition);
      border-left: 3px solid transparent;
    }
    .module-item:hover { background: rgba(255,255,255,0.6); }
    .module-item.active {
      background: rgba(255,255,255,0.8);
      border-left-color: var(--plum);
    }
    .module-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--sand); color: var(--earth);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    }
    .module-item.active .module-num {
      background: var(--plum); color: var(--cream);
    }
    .module-title { font-size: 0.9rem; color: var(--earth); font-weight: 500; flex: 1; line-height: 1.3; }
    .module-item.active .module-title { font-weight: 700; }
    
    .module-checkbox {
      width: 20px; height: 20px; cursor: pointer;
      accent-color: var(--sage);
      flex-shrink: 0;
    }

    /* Locked state */
    .locked-state {
      text-align: center; padding: 60px 32px;
    }
    .locked-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .locked-state h2 { color: var(--earth); margin-bottom: 12px; }
    .locked-state p { color: var(--clay); margin-bottom: 24px; }

    /* Responsive */
    @media (max-width: 900px) {
      .curso-layout { grid-template-columns: 1fr; }
      .curso-sidebar {
        border-left: none; border-top: 1px solid var(--sand);
        max-height: 300px;
      }
      .video-area { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="curso-nav">
    <a href="index.html" class="brand">
      <h4>Denise Venica</h4>
    </a>
    <a href="dashboard.html" class="back-btn">← Volver a mi panel</a>
  </nav>

  <!-- LOCKED STATE (shown when user doesn't have access) -->
  <div class="locked-state" id="lockedState" style="display:none;">
    <div class="icon">🔒</div>
    <h2>No tenés acceso a este curso</h2>
    <p>Comprá el acceso desde tu panel para desbloquear todo el contenido.</p>
    <a href="dashboard.html" class="btn btn-primary">Ir a mi panel</a>
  </div>

  <!-- COURSE CONTENT (shown when user has access) -->
  <div class="curso-layout" id="cursoContent" style="display:none;">

    <!-- Video Player -->
    <div class="video-area">
      <div class="video-wrapper" id="videoWrapper">
        <!-- Vimeo iframe se inyecta dinámicamente -->
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">
          <p>Cargando video...</p>
        </div>
      </div>
      <div class="video-info">
        <h1 id="moduleTitle">Cargando...</h1>
        <p id="moduleDescription"></p>
      </div>
    </div>

    <!-- Sidebar de módulos -->
    <aside class="curso-sidebar">
      <div class="sidebar-header">
        <h3 id="courseTitle">Módulos del curso</h3>
        <p id="courseProgress">0 módulos</p>
      </div>
      <div id="modulesList">
        <!-- Módulos se renderizan dinámicamente -->
      </div>
    </aside>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="curso.js"></script>

</body>
</html>
