<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denise Venica — Psicología y Crianza</title>
  <style>
    body { font-family: 'DM Sans', Arial, sans-serif; background-color: #faf8f5; color: #593b1f; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(89, 59, 31, 0.08); }
    .header { background-color: #53583e; padding: 40px 20px; text-align: center; }
    .header h1 { color: #ede1d2; font-family: 'Playfair Display', serif; font-size: 24px; margin: 0; letter-spacing: 0.05em; }
    .content { padding: 40px 30px; line-height: 1.8; font-size: 16px; }
    .content h2 { color: #6e5d91; font-family: 'Playfair Display', serif; font-size: 20px; margin-top: 0; }
    .footer { background-color: #d8dad3; padding: 30px; text-align: center; font-size: 14px; color: #806044; }
    .btn { display: inline-block; padding: 14px 28px; background-color: #6e5d91; color: #ede1d2; text-decoration: none; border-radius: 50px; font-weight: 600; margin-top: 20px; }
    .social-links { margin-top: 20px; }
    .social-links a { margin: 0 10px; color: #53583e; text-decoration: none; font-weight: bold; }
    .signature { margin-top: 30px; font-style: italic; color: #6e5d91; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Denise Venica</h1>
      <p style="color: #ede1d2; opacity: 0.8; margin-top: 5px; font-size: 14px;">Psicología y Crianza</p>
    </div>
    <div class="content">
      <h2>Hola {nombre},</h2>
      {mensaje}
      <div class="signature">
        <p>Siempre es con amor,<br>Deni.</p>
      </div>
    </div>
    <div class="footer">
      <p>Has recibido este correo porque formas parte de la comunidad de Denise Venica.</p>
      <div class="social-links">
        <a href="https://instagram.com/psidenisevenica">Instagram</a>
        <a href="https://denisevenica.com">Web</a>
      </div>
      <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">© 2026 Denise Venica · Todos los derechos reservados.</p>
    </div>
  </div>
</body>
</html>
