<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Panel | Denise Venica</title>
  <meta name="description" content="Panel de aprendizaje - Accedé a tus cursos y materiales exclusivos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--white); margin: 0; padding-top: 70px; }

    /* Dashboard Nav */
    .dash-nav {
      background: #fff; padding: 14px 24px; border-bottom: 1px solid var(--linen);
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      box-sizing: border-box;
    }
    .dash-nav .brand { display: flex; align-items: center; gap: 10px; }
    .dash-nav .brand h4 { font-size: 1.15rem; color: var(--earth); margin: 0; }
    .dash-nav .brand span {
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem;
      color: var(--clay); opacity: 0.7;
    }
    .dash-nav .user-menu {
      display: flex; align-items: center; gap: 16px;
      font-size: 0.9rem; font-weight: 600; color: var(--earth);
    }
    .dash-nav .logout {
      color: var(--plum); font-weight: 500; font-size: 0.85rem;
      cursor: pointer; background: none; border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .dash-nav .logout:hover { text-decoration: underline; }

    /* Header */
    .dash-header {
      background: linear-gradient(135deg, var(--plum), var(--sage));
      color: var(--cream); padding: 60px 24px;
      text-align: center; margin-bottom: 40px;
    }
    .dash-header h1 { font-size: 2.2rem; margin-bottom: 8px; }
    .dash-header p { opacity: 0.85; font-size: 1.05rem; margin: 0; }

    /* Container */
    .dash-container { max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }

    /* Course sections */
    .course-section { margin-bottom: 48px; }
    .course-section h2 {
      color: var(--earth); font-size: 1.5rem;
      border-bottom: 2px solid var(--linen);
      padding-bottom: 12px; margin-bottom: 24px;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* Course cards */
    .course-card {
      background: #fff; border-radius: var(--radius-sm);
      border: 1px solid var(--linen); overflow: hidden;
      transition: var(--transition); position: relative;
    }
    .course-card:hover {
      box-shadow: 0 10px 30px var(--shadow);
      transform: translateY(-3px);
    }

    .course-img {
      width: 100%; aspect-ratio: 16/9;
      background: var(--sand); position: relative;
    }

    .course-content { padding: 24px; }
    .course-badge {
      display: inline-block; padding: 4px 10px; border-radius: 4px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 12px;
    }
    .course-badge.active { background: rgba(83,88,62,0.15); color: var(--sage); }
    .course-badge.locked { background: rgba(89,59,31,0.1); color: var(--earth); }

    .course-content h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--earth); }
    .course-content p { font-size: 0.9rem; color: var(--clay); margin-bottom: 20px; line-height: 1.5; }

    .course-card .btn {
      width: 100%; justify-content: center;
      padding: 12px; font-size: 0.9rem;
    }

    /* Overlay for locked content */
    .locked-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.7); backdrop-filter: blur(2px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; opacity: 0; transition: var(--transition);
      pointer-events: none; /* Permite clickear lo que está debajo */
    }
    .course-card:hover .locked-overlay { opacity: 1; }
    .locked-icon { font-size: 2rem; margin-bottom: 8px; pointer-events: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .dash-header h1 { font-size: 1.8rem; }
      .dash-header { padding: 40px 20px; }
      .course-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="dash-nav">
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="index.html" class="brand">
        <h4>Denise Venica</h4>
      </a>
      <a href="index.html" style="font-size:0.8rem; color:var(--earth); text-decoration:none; padding:4px 10px; border:1px solid rgba(83,88,62,0.3); border-radius:20px; transition:0.3s;" onmouseover="this.style.background='rgba(83,88,62,0.05)'" onmouseout="this.style.background='transparent'">🌍 Visitar página web</a>
    </div>
    <div class="user-menu">
      <span id="userName">Cargando...</span>
      <button class="logout" onclick="handleLogout()">Cerrar sesión</button>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="dash-header">
    <h1 id="welcomeGreeting">Mi Aprendizaje</h1>
    <p>Tu espacio seguro de crianza y aprendizaje.</p>
  </header>

  <!-- CONTENT -->
  <main class="dash-container">

    <!-- MIS CURSOS ACTIVOS -->
    <section class="course-section" id="activeSection">
      <h2>Mis Programas Activos</h2>
      <div class="course-grid" id="activeCoursesGrid">
        <!-- Se renderiza dinámicamente desde dashboard.js -->
      </div>
    </section>

    <!-- CURSOS DISPONIBLES -->
    <section class="course-section" id="availableSection">
      <h2>Programas Recomendados</h2>
      <div class="course-grid" id="availableCoursesGrid">
        <!-- Se renderiza dinámicamente desde dashboard.js -->
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
